<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>건축구조 플래시카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="color-scheme" content="light">
<style>
:root{
  color-scheme: light;
  --bg:#f5f4f0;--surface:#ffffff;--card:#ffffff;--border:#e0ddd5;
  --accent:#8a6f2e;--accent2:#2e6f8a;
  --green:#2e7d40;--red:#c0392b;--text:#1a1814;--muted:#888070;--sub:#ccc;
  --ox-o:rgba(46,125,64,.12);--ox-x:rgba(192,57,43,.12);
}
[data-theme="dark"]{
  color-scheme: dark;
  --bg:#1a1a1e;--surface:#26262c;--card:#2c2c34;--border:#3a3a44;
  --accent:#c9a84c;--accent2:#4aabcf;
  --green:#4caf70;--red:#e05c5c;--text:#e8e4dc;--muted:#888888;--sub:#555;
  --ox-o:rgba(76,175,112,.15);--ox-x:rgba(224,92,92,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg) !important;color:var(--text) !important;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
  display:flex;flex-direction:column;align-items:center;padding:16px 14px 40px;}
header{width:100%;max-width:580px;display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.title{font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:.04em;}
.subtitle{font-size:.63rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.hstats{display:flex;gap:12px;font-family:'DM Mono',monospace;}
.hsn{font-size:1.05rem;font-weight:500;text-align:center;}
.hsn.g{color:var(--green);}.hsn.r{color:var(--red);}.hsn.a{color:var(--accent);}
.hsl{font-size:.58rem;color:var(--muted);text-align:center;margin-top:1px;}
.hamburger-btn{background:none;border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;cursor:pointer;color:var(--muted);font-size:1rem;line-height:1;transition:all .18s;}
.hamburger-btn:hover{border-color:var(--accent);color:var(--accent);}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;right:0;height:100%;width:220px;background:var(--surface);
  border-left:1px solid var(--border);z-index:301;display:flex;flex-direction:column;
  padding:20px 16px;gap:4px;transform:translateX(100%);transition:transform .25s ease;}
.drawer.open{transform:translateX(0);}
.drawer-title{font-size:.65rem;font-family:'DM Mono',monospace;color:var(--muted);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;margin-top:8px;}
.drawer-btn{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:9px;
  border:none;background:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:.88rem;cursor:pointer;text-align:left;transition:background .15s;width:100%;}
.drawer-btn:hover,.drawer-btn.active{background:var(--card);}
.drawer-btn.active{color:var(--accent);font-weight:600;}
.drawer-close{margin-top:auto;padding:10px;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;cursor:pointer;}
.tabs{width:100%;max-width:580px;display:flex;gap:3px;background:var(--surface);
  border-radius:9px;padding:3px;border:1px solid var(--border);margin-bottom:12px;flex-shrink:0;}
.tab{flex:1;padding:7px 2px;text-align:center;font-size:.68rem;color:var(--muted);cursor:pointer;
  border-radius:6px;border:none;background:transparent;font-family:'DM Mono',monospace;transition:all .18s;}
.tab.active{background:var(--card);color:var(--accent);border:1px solid var(--border);}
.cat-row{width:100%;max-width:580px;display:flex;flex-direction:column;gap:4px;margin-bottom:12px;flex-shrink:0;}
.cat-part-group{width:100%;}
.cat-part-header{display:flex;align-items:center;justify-content:space-between;
  padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  cursor:pointer;user-select:none;transition:border-color .18s;}
.cat-part-header:hover{border-color:var(--accent);}
.cat-part-header.has-active{border-color:var(--accent);background:rgba(212,193,122,.07);}
.cat-part-label{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);font-weight:500;}
.cat-part-label.has-active{color:var(--accent);}
.cat-part-arrow{font-size:.65rem;color:var(--muted);transition:transform .2s;}
.cat-part-arrow.open{transform:rotate(180deg);}
.cat-part-items{display:none;flex-wrap:wrap;gap:5px;padding:6px 2px 2px;}
.cat-part-items.open{display:flex;}
.cat-all-btn{padding:5px 14px;font-size:.68rem;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;transition:all .18s;align-self:flex-start;}
.cat-all-btn.active{background:var(--accent);color:#141414;border-color:var(--accent);font-weight:500;}
.cat-btn{padding:4px 10px;font-size:.67rem;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;transition:all .18s;}
.cat-btn.active{background:var(--accent);color:#141414;border-color:var(--accent);font-weight:500;}
.btn-next{width:100%;padding:13px;border-radius:11px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:.9rem;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .16s;flex-shrink:0;
  position:sticky;bottom:12px;z-index:10;box-shadow:0 4px 20px rgba(0,0,0,.4);}
.btn-next:hover{border-color:var(--accent);color:var(--accent);}
.dl-btn{padding:5px 12px;font-size:.68rem;font-family:'DM Mono',monospace;
  background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:7px;cursor:pointer;transition:all .16s;text-decoration:none;display:inline-block;}
.dl-btn:hover{border-color:var(--accent);color:var(--accent);}
#study-view{width:100%;max-width:580px;display:flex;flex-direction:column;flex-shrink:0;}
.cat-select-toggle{width:100%;padding:9px 14px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.72rem;
  cursor:pointer;text-align:left;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:all .16s;}
.cat-select-toggle.active{border-color:var(--accent);color:var(--accent);}
.cat-select-panel{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:12px;margin-bottom:10px;display:none;flex-direction:column;gap:8px;}
.cat-select-panel.open{display:flex;}
.cat-select-part{display:flex;flex-direction:column;gap:4px;}
.cat-select-part-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent);
  letter-spacing:.08em;padding-bottom:3px;border-bottom:1px solid var(--border);margin-bottom:2px;}
.cat-select-items{display:flex;flex-wrap:wrap;gap:5px;}
.cat-check-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:.72rem;cursor:pointer;transition:all .15s;}
.cat-check-btn.checked{border-color:var(--accent);color:var(--accent);background:rgba(212,193,122,.1);}
.cat-select-actions{display:flex;gap:6px;margin-top:4px;}
.cat-select-actions button{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;}
.cat-select-actions button:last-child{border-color:var(--accent);color:var(--accent);}
.prog-wrap{width:100%;flex-shrink:0;}
.prog-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;}
.prog-label{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--muted);
  display:flex;justify-content:space-between;margin-bottom:10px;}
.prog-label .ql{color:var(--accent2);}
.mbadge{font-family:'DM Mono',monospace;font-size:.62rem;padding:3px 10px;border-radius:10px;
  margin-bottom:9px;display:inline-block;flex-shrink:0;}
.mb-new{background:rgba(106,191,123,.12);color:var(--green);border:1px solid rgba(106,191,123,.25);}
.mb-review{background:rgba(212,193,122,.12);color:var(--accent);border:1px solid rgba(212,193,122,.25);}
.card-scene{width:100%;margin-bottom:11px;flex-shrink:0;}
.card-face{width:100%;border-radius:13px;border:1px solid var(--border);
  padding:24px 20px 20px;background:var(--card);
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
  animation:cardIn .22s ease;
  max-height:48vh;overflow-y:auto;}
.card-front{background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,193,122,.07) 0%,transparent 70%),var(--card);}
.card-back{background:radial-gradient(ellipse 80% 50% at 50% 100%,rgba(122,184,212,.07) 0%,transparent 70%),var(--card);}
.card-cat{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;opacity:.8;}
.card-q{font-size:.98rem;font-weight:500;color:var(--text);line-height:1.7;word-break:keep-all;}
.card-hint{font-size:.65rem;color:var(--sub);font-family:'DM Mono',monospace;margin-top:12px;}
.card-ans-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent2);letter-spacing:.1em;margin-bottom:10px;}
.card-ans{font-size:1.28rem;font-weight:700;color:var(--accent);line-height:1.5;word-break:keep-all;}
.card-note{margin-top:12px;font-size:.75rem;color:var(--muted);line-height:1.7;padding:8px 12px;
  background:rgba(122,184,212,.07);border-radius:8px;border-left:2px solid var(--accent2);
  text-align:left;width:100%;word-break:keep-all;}
.card-edit-btn{margin-top:12px;padding:4px 12px;font-size:.65rem;font-family:'DM Mono',monospace;
  background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;transition:all .15s;}
.card-edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.ox-card{width:100%;border-radius:13px;border:1px solid var(--border);
  padding:28px 20px 22px;background:var(--card);
  display:flex;flex-direction:column;align-items:center;text-align:center;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,193,122,.05) 0%,transparent 70%),var(--card);}
.ox-type-badge{font-family:'DM Mono',monospace;font-size:.58rem;padding:2px 9px;border-radius:8px;
  background:rgba(122,184,212,.15);color:var(--accent2);border:1px solid rgba(122,184,212,.2);margin-bottom:10px;}
.ox-statement{font-size:.98rem;font-weight:500;color:var(--text);line-height:1.75;word-break:keep-all;margin-bottom:18px;}
.ox-result{display:none;flex-direction:column;align-items:center;gap:8px;margin-top:4px;width:100%;}
.ox-result.show{display:flex;}
.ox-result-badge{font-size:2rem;font-weight:700;}
.ox-result-badge.correct{color:var(--green);}
.ox-result-badge.wrong{color:var(--red);}
.ox-result-text{font-size:.82rem;color:var(--muted);line-height:1.65;word-break:keep-all;}
.ox-result-note{margin-top:6px;font-size:.75rem;color:var(--muted);line-height:1.7;padding:8px 12px;
  background:rgba(122,184,212,.07);border-radius:8px;border-left:2px solid var(--accent2);
  text-align:left;width:100%;word-break:keep-all;}
.cloze-card{width:100%;border-radius:13px;border:1px solid var(--border);
  padding:24px 20px 20px;background:var(--card);
  display:flex;flex-direction:column;align-items:flex-start;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,193,122,.05) 0%,transparent 70%),var(--card);}
.cloze-title{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent);
  letter-spacing:.1em;margin-bottom:6px;opacity:.8;align-self:center;}
.cloze-type-badge{font-family:'DM Mono',monospace;font-size:.58rem;padding:2px 9px;border-radius:8px;
  background:rgba(212,193,122,.12);color:var(--accent);border:1px solid rgba(212,193,122,.2);
  margin-bottom:12px;align-self:center;}
.cloze-table{width:100%;border-collapse:collapse;margin-bottom:6px;}
.cloze-table tr{border-bottom:1px solid var(--border);}
.cloze-table tr:last-child{border-bottom:none;}
.cloze-table td{padding:8px 6px;font-size:.88rem;line-height:1.5;vertical-align:middle;}
.cloze-table td:first-child{color:var(--muted);font-size:.82rem;width:60%;}
.cloze-table td:last-child{text-align:right;white-space:nowrap;}
.cloze-blank{display:inline-block;background:var(--accent);color:#141414;
  border-radius:5px;padding:2px 10px;font-weight:700;font-family:'DM Mono',monospace;
  cursor:pointer;font-size:.88rem;transition:all .2s;user-select:none;min-width:36px;text-align:center;}
.cloze-blank:hover{opacity:.85;}
.cloze-blank.revealed{background:rgba(212,193,122,.15);color:var(--accent);cursor:default;}
.cloze-hint{font-size:.63rem;color:var(--sub);font-family:'DM Mono',monospace;margin-top:10px;align-self:center;}
.btn-row{width:100%;display:flex;gap:7px;flex-shrink:0;position:sticky;bottom:0;background:var(--bg);padding:6px 0 2px;z-index:10;}
.btn{flex:1;padding:14px 6px;border-radius:11px;border:1px solid;font-size:.85rem;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .16s;font-weight:700;}
.btn-know{background:rgba(106,191,123,.1);border-color:rgba(106,191,123,.3);color:var(--green);}
.btn-know:hover{background:rgba(106,191,123,.2);border-color:var(--green);}
.btn-dontknow{background:rgba(191,106,106,.1);border-color:rgba(191,106,106,.3);color:var(--red);}
.btn-dontknow:hover{background:rgba(191,106,106,.2);border-color:var(--red);}
.btn-flip{background:transparent;border-color:var(--border);color:var(--muted);flex:0 0 auto;padding:14px 16px;}
.btn-flip:hover{border-color:var(--accent);color:var(--accent);}
.ox-btn-row{width:100%;display:flex;gap:10px;flex-shrink:0;position:sticky;bottom:0;background:var(--bg);padding:6px 0 2px;z-index:10;}
.ox-btn{flex:1;padding:16px;border-radius:12px;border:1px solid;font-size:1.4rem;
  cursor:pointer;transition:all .18s;font-weight:700;font-family:'Noto Sans KR',sans-serif;}
.ox-btn-o{background:var(--ox-o);border-color:rgba(106,191,123,.35);color:var(--green);}
.ox-btn-o:hover{background:rgba(106,191,123,.25);border-color:var(--green);}
.ox-btn-x{background:var(--ox-x);border-color:rgba(191,106,106,.35);color:var(--red);}
.ox-btn-x:hover{background:rgba(191,106,106,.25);border-color:var(--red);}
.ox-btn.selected-o{background:rgba(106,191,123,.3);border-color:var(--green);box-shadow:0 0 0 2px rgba(106,191,123,.3);}
.ox-btn.selected-x{background:rgba(191,106,106,.3);border-color:var(--red);box-shadow:0 0 0 2px rgba(191,106,106,.3);}
.btn-next{width:100%;padding:13px;border-radius:11px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:.9rem;font-weight:700;
  font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .16s;flex-shrink:0;}
.btn-next:hover{border-color:var(--accent);color:var(--accent);}
.start-screen{display:none;flex-direction:column;align-items:center;padding:20px 0;gap:14px;width:100%;}
.start-title{font-size:1rem;font-weight:700;color:var(--text);text-align:center;}
.start-sub{font-size:.78rem;color:var(--muted);text-align:center;line-height:1.6;}
.count-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.count-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);
  color:var(--muted);font-family:'DM Mono',monospace;font-size:.8rem;cursor:pointer;transition:all .18s;}
.count-btn.sel{background:var(--accent);color:#141414;border-color:var(--accent);font-weight:500;}
.start-go{padding:13px 32px;background:var(--accent);color:#141414;border:none;border-radius:10px;
  font-family:'Noto Sans KR',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .18s;}
.start-go:hover{opacity:.85;}
.weight-info{font-size:.7rem;color:var(--muted);font-family:'DM Mono',monospace;text-align:center;line-height:1.6;
  padding:10px 14px;background:var(--surface);border-radius:8px;border:1px solid var(--border);width:100%;max-width:380px;}
.complete-screen{display:none;flex-direction:column;align-items:center;text-align:center;padding:28px 12px;}
.complete-icon{font-size:2.4rem;margin-bottom:10px;}
.complete-title{font-size:1.25rem;font-weight:700;color:var(--accent);margin-bottom:6px;}
.complete-sub{font-size:.8rem;color:var(--muted);line-height:1.7;margin-bottom:20px;white-space:pre-line;}
.complete-stats{display:flex;gap:16px;margin-bottom:20px;}
.btn-action{padding:11px 20px;border-radius:9px;font-family:'Noto Sans KR',sans-serif;
  font-size:.86rem;font-weight:700;cursor:pointer;transition:opacity .18s;margin:3px;border:none;}
.btn-primary{background:var(--accent);color:#141414;}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.btn-action:hover{opacity:.82;}
.list-view{width:100%;max-width:580px;display:none;flex-direction:column;gap:6px;}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:11px 14px;display:flex;justify-content:space-between;align-items:center;transition:all .18s;position:relative;}
.list-item.known{border-left:3px solid var(--green);}
.list-item.unknown{border-left:3px solid var(--red);}
.list-item.selected{background:rgba(212,193,122,.07);border-color:var(--accent);}
.list-cb{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);background:var(--card);
  cursor:pointer;flex-shrink:0;margin-right:10px;display:none;align-items:center;justify-content:center;transition:all .16s;}
.list-cb.show{display:flex;}
.list-cb.checked{background:var(--accent);border-color:var(--accent);}
.list-cb.checked::after{content:'✓';font-size:.7rem;color:#141414;font-weight:700;}
.list-q{font-size:.86rem;font-weight:500;}
.list-a{font-size:.7rem;color:var(--accent);margin-top:2px;font-family:'DM Mono',monospace;}
.list-type-ox{font-size:.6rem;color:var(--accent2);font-family:'DM Mono',monospace;margin-top:1px;}
.list-right{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px;}
.lbadge{font-family:'DM Mono',monospace;font-size:.6rem;padding:2px 7px;border-radius:7px;white-space:nowrap;}
.lbadge-g{background:rgba(106,191,123,.15);color:var(--green);}
.lbadge-r{background:rgba(191,106,106,.15);color:var(--red);}
.lbadge-n{background:var(--card);color:var(--muted);}
.list-edit-btn{padding:3px 8px;font-size:.6rem;font-family:'DM Mono',monospace;
  background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:5px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.list-edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.list-toolbar{width:100%;max-width:580px;display:none;align-items:center;justify-content:space-between;
  margin-bottom:8px;gap:8px;flex-shrink:0;}
.list-toolbar.show{display:flex;}
.sel-info{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);}
.sel-info span{color:var(--accent);font-weight:500;}
.toolbar-btns{display:flex;gap:6px;}
.tbtn{padding:6px 12px;border-radius:7px;font-family:'DM Mono',monospace;font-size:.7rem;
  cursor:pointer;border:1px solid;transition:all .16s;font-weight:500;}
.tbtn-del{background:rgba(191,106,106,.1);border-color:rgba(191,106,106,.3);color:var(--red);}
.tbtn-del:hover{background:rgba(191,106,106,.2);border-color:var(--red);}
.tbtn-sel{background:transparent;border-color:var(--border);color:var(--muted);}
.tbtn-sel:hover{border-color:var(--accent);color:var(--accent);}
.tbtn-sel.active{background:rgba(212,193,122,.1);border-color:var(--accent);color:var(--accent);}
.trash-view{width:100%;max-width:580px;display:none;flex-direction:column;gap:6px;}
.trash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.trash-title{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);}
.tbtn-empty{padding:6px 12px;border-radius:7px;font-family:'DM Mono',monospace;font-size:.7rem;
  cursor:pointer;background:rgba(191,106,106,.1);border:1px solid rgba(191,106,106,.3);color:var(--red);transition:all .16s;}
.tbtn-empty:hover{background:rgba(191,106,106,.2);}
.trash-item{background:var(--surface);border:1px dashed var(--border);border-radius:9px;
  padding:11px 14px;display:flex;justify-content:space-between;align-items:center;opacity:.7;}
.trash-item:hover{opacity:1;}
.tbtn-restore{padding:4px 10px;font-size:.65rem;font-family:'DM Mono',monospace;
  background:rgba(106,191,123,.1);border:1px solid rgba(106,191,123,.3);color:var(--green);
  border-radius:5px;cursor:pointer;white-space:nowrap;transition:all .15s;}
.tbtn-restore:hover{background:rgba(106,191,123,.2);}
.trash-del-btn{padding:4px 10px;font-size:.65rem;font-family:'DM Mono',monospace;
  background:transparent;border:1px solid rgba(191,106,106,.3);color:var(--red);
  border-radius:5px;cursor:pointer;white-space:nowrap;margin-left:4px;transition:all .15s;}
.trash-del-btn:hover{background:rgba(191,106,106,.15);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;
  align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:22px 20px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px;}
.modal-title{font-size:.95rem;font-weight:700;color:var(--accent);}
.modal label{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:3px;display:block;}
.modal input,.modal textarea,.modal select{background:var(--card);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.88rem;
  padding:9px 12px;outline:none;width:100%;resize:vertical;transition:border-color .18s;}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent);}
.modal select option{background:var(--card);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.modal-btn{padding:9px 18px;border-radius:8px;font-family:'Noto Sans KR',sans-serif;
  font-size:.84rem;font-weight:700;cursor:pointer;border:none;transition:opacity .18s;}
.modal-btn:hover{opacity:.82;}
.modal-save{background:var(--accent);color:#141414;}
.modal-del{background:rgba(191,106,106,.2);color:var(--red);border:1px solid rgba(191,106,106,.3);}
.modal-cancel{background:var(--card);color:var(--muted);border:1px solid var(--border);}
.cal-view{width:100%;max-width:580px;padding-bottom:40px;}
.cal-month{margin-bottom:24px;}
.cal-month-title{font-size:.85rem;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;margin-bottom:10px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{font-size:.6rem;color:var(--muted);font-family:'DM Mono',monospace;text-align:center;padding-bottom:4px;}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-size:.7rem;
  color:var(--muted);background:var(--surface);border:1px solid var(--border);position:relative;transition:transform .15s;}
.cal-day.today{border-color:var(--accent2);color:var(--accent2);}
.cal-day.stamped{background:rgba(138,111,46,.07);border-color:var(--accent);}
.cal-day.empty{background:transparent;border-color:transparent;}
.cal-stamp{font-size:1.3rem;line-height:1;}
.cal-day-num{font-size:.58rem;color:var(--muted);margin-top:1px;}
.cal-streak{text-align:center;font-size:.78rem;color:var(--muted);
  margin-bottom:16px;padding:10px;background:var(--surface);border-radius:10px;border:1px solid var(--border);}
.cal-streak b{color:var(--accent);}
.stats-section{margin-bottom:20px;}
.stats-section-title{font-size:.7rem;font-family:'DM Mono',monospace;color:var(--accent);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;opacity:.8;}
.stats-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.stats-cat-name{font-size:.78rem;color:var(--text);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stats-bar-wrap{flex:1;height:8px;background:var(--card);border-radius:4px;overflow:hidden;}
.stats-bar{height:100%;border-radius:4px;transition:width .4s ease;}
.stats-bar.good{background:var(--green);}
.stats-bar.bad{background:var(--red);}
.stats-bar.mid{background:var(--accent);}
.stats-counts{font-size:.7rem;font-family:'DM Mono',monospace;color:var(--muted);width:60px;text-align:right;flex-shrink:0;}
.stats-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.stats-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center;}
.stats-card-num{font-size:1.5rem;font-weight:700;color:var(--accent);}
.stats-card-label{font-size:.65rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.stats-weak-badge{display:inline-block;font-size:.65rem;font-family:'DM Mono',monospace;
  background:rgba(191,106,106,.15);color:var(--red);border:1px solid rgba(191,106,106,.3);
  border-radius:5px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.add-view{display:none;flex-direction:column;gap:10px;width:100%;max-width:580px;}
.add-view label{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:3px;display:block;}
.add-view input,.add-view textarea,.add-view select{background:var(--surface);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.88rem;
  padding:9px 12px;outline:none;width:100%;resize:vertical;transition:border-color .18s;}
.add-view input:focus,.add-view textarea:focus,.add-view select:focus{border-color:var(--accent);}
.add-view select option{background:var(--surface);}
.btn-add-sub{padding:12px;background:var(--accent);color:#141414;border:none;border-radius:8px;
  font-family:'Noto Sans KR',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;}
.type-toggle{display:flex;gap:6px;margin-bottom:2px;}
.type-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--card);
  color:var(--muted);font-family:'DM Mono',monospace;font-size:.78rem;cursor:pointer;transition:all .18s;text-align:center;}
.type-btn.active{background:var(--accent);color:#141414;border-color:var(--accent);font-weight:600;}
@keyframes cardIn{from{opacity:0;transform:translateY(7px) scale(.985);}to{opacity:1;transform:translateY(0) scale(1);}}
.card-scene,.ox-card-wrap{animation:cardIn .25s ease;}
.ox-card-wrap{width:100%;margin-bottom:11px;flex-shrink:0;}
.subject-row{width:100%;max-width:580px;display:flex;gap:6px;margin-bottom:10px;flex-shrink:0;}
.subject-btn{flex:1;padding:8px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);font-family:'DM Mono',monospace;
  font-size:.75rem;cursor:pointer;transition:all .18s;text-align:center;}
.subject-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(212,193,122,.08);font-weight:600;}
.card-example{margin-top:10px;font-size:.78rem;color:var(--accent2);line-height:1.65;
  font-style:italic;padding:7px 11px;background:rgba(122,184,212,.06);
  border-radius:7px;border-left:2px solid var(--accent2);text-align:left;width:100%;}

/* ── 둥둥 이모지 ── */
#floaty-field {
  position: fixed;
  left: 0; top: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.floaty {
  position: absolute;
  font-size: 1.6rem;
  animation: floaty-up 4s ease-out forwards;
  user-select: none;
}
@keyframes floaty-up {
  0%   { transform: translateY(0) rotate(0deg) scale(1);   opacity: 1; }
  30%  { transform: translateY(-60px) rotate(15deg) scale(1.15); opacity: 1; }
  60%  { transform: translateY(-110px) rotate(-10deg) scale(1); opacity: 0.9; }
  100% { transform: translateY(-180px) rotate(5deg) scale(0.8); opacity: 0; }
}
</style>
</head>
<body>
<div id="floaty-field"></div>
<header>
  <div>
    <div class="title" id="app-title">플래시카드</div>
    <div class="subtitle" id="app-subtitle">9급 건축직 공무원 시험 대비</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="hstats">
      <div><div class="hsn g" id="st-know">0</div><div class="hsl">완료</div></div>
      <div><div class="hsn r" id="st-left">0</div><div class="hsl">남은것</div></div>
      <div><div class="hsn a" id="st-total">0</div><div class="hsl">전체</div></div>
    </div>
    <button class="hamburger-btn" onclick="openDrawer()">☰</button>
  </div>
</header>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-title">더보기</div>
  <button class="drawer-btn" id="drawer-calendar" onclick="switchTab('calendar');closeDrawer()">📅 출석 캘린더</button>
  <button class="drawer-btn" id="drawer-stats"    onclick="switchTab('stats');closeDrawer()">📊 통계</button>
  <div class="drawer-title">관리</div>
  <button class="drawer-btn" id="drawer-trash"    onclick="switchTab('trash');closeDrawer()">🗑 휴지통 <span id="trash-badge"></span></button>
  <button class="drawer-btn" id="drawer-settings" onclick="switchTab('settings');closeDrawer()">⚙ 설정</button>
  <button class="drawer-close" onclick="closeDrawer()">닫기</button>
</div>
<div class="subject-row">
  <button class="subject-btn active" id="subj-arch" onclick="switchSubject('arch')">🏗 건축구조</button>
  <button class="subject-btn" id="subj-eng" onclick="switchSubject('eng')">📚 영단어</button>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('study')">학습</button>
  <button class="tab"        onclick="switchTab('review')">복습</button>
  <button class="tab"        onclick="switchTab('list')">목록</button>
  <button class="tab"        onclick="switchTab('add')">추가</button>
</div>
<div id="global-cat-wrap" style="width:100%;max-width:580px;margin-bottom:6px;">
  <button class="cat-select-toggle" id="cat-select-toggle" onclick="toggleCatSelectPanel()">
    <span id="cat-select-label">📚 단원 선택</span>
    <span>▾</span>
  </button>
  <div class="cat-select-panel" id="cat-select-panel">
    <div id="cat-check-groups"></div>
    <div class="cat-select-actions">
      <button onclick="catCheckAll(false)">전체 해제</button>
      <button onclick="catCheckAll(true)">전체 선택</button>
      <button onclick="applyCatSelect()" style="background:rgba(138,111,46,.1)!important;">적용 →</button>
    </div>
  </div>
</div>
<div class="cat-row" id="cat-row"></div>
<div id="study-view">
  <div class="prog-wrap" id="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-label"><span id="prog-text">0/0</span><span class="ql" id="ql"></span></div>
  </div>
  <div id="mbadge-wrap"></div>
  <div class="card-scene" id="card-scene">
    <div class="card-face card-front" id="card-front" onclick="flipCard()"></div>
    <div class="card-face card-back"  id="card-back"  style="display:none;" onclick="flipCard()"></div>
  </div>
  <div class="btn-row" id="btn-row">
    <button class="btn btn-dontknow" onclick="answer(false)">모르겠어 ✕</button>
    <button class="btn btn-flip" id="btn-flip" onclick="flipCard()">답 보기</button>
    <button class="btn btn-know"     onclick="answer(true)">알겠어 ✓</button>
  </div>
  <div class="ox-card-wrap" id="ox-card-wrap" style="display:none;">
    <div class="ox-card" id="ox-card"></div>
  </div>
  <div class="ox-btn-row" id="ox-btn-row" style="display:none;">
    <button class="ox-btn ox-btn-o" id="ox-o" onclick="answerOX('O')">○</button>
    <button class="ox-btn ox-btn-x" id="ox-x" onclick="answerOX('X')">✕</button>
  </div>
  <div class="ox-card-wrap" id="cloze-card-wrap" style="display:none;">
    <div class="cloze-card" id="cloze-card"></div>
  </div>
  <div class="btn-row" id="cloze-btn-row" style="display:none;">
    <button class="btn btn-dontknow" onclick="answer(false)">모르겠어 ✕</button>
    <button class="btn btn-know"     onclick="answer(true)">알겠어 ✓</button>
  </div>
  <button class="btn-next" id="btn-next" style="display:none;" onclick="answer(lastOXCorrect)">다음 →</button>
  <div class="complete-screen" id="complete-screen">

    <div class="complete-sub" id="cs"></div>
    <div class="complete-stats">
      <div><div class="hsn g" id="cc-k">0</div><div class="hsl">맞음</div></div>
      <div><div class="hsn r" id="cc-d">0</div><div class="hsl">틀림</div></div>
    </div>
    <div id="complete-btns"></div>
  </div>
</div>
<div id="stats-view" style="display:none;width:100%;max-width:580px;padding-bottom:40px;">
  <div id="stats-content"></div>
</div>
<div id="calendar-view" style="display:none;width:100%;max-width:580px;padding-bottom:40px;">
  <div id="calendar-content"></div>
</div>
<div id="review-view" style="display:none;width:100%;max-width:580px;">
  <div class="start-screen" id="review-start">
    <div class="start-title">복습 모드</div>
    <div class="start-sub" id="review-sub">오늘 복습할 카드를 자동으로 선별해요<br>마지막으로 본 날짜·오답률 기반</div>
    <div class="weight-info" id="weight-info"></div>
    <div style="display:flex;gap:8px;width:100%;margin-top:4px;">
      <button class="start-go" style="flex:1;" onclick="startReview(false)">복습 시작</button>
      <button class="start-go" style="flex:1;background:rgba(192,57,43,.1);border:1px solid var(--red);color:var(--red);" onclick="startReview(true)">🎯 취약 우선</button>
    </div>
  </div>
</div>
<div id="list-search-wrap" style="display:none;width:100%;max-width:580px;margin-bottom:8px;display:none;flex-direction:column;gap:6px;">
  <div style="position:relative;width:100%;">
    <input id="list-search" type="text" placeholder="🔍  조건·답·키워드 검색..."
      oninput="renderList();updateListSearchClear()"
      style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;
        color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.88rem;
        padding:10px 40px 10px 14px;outline:none;transition:border-color .18s;"
      onfocus="this.style.borderColor='var(--accent)'"
      onblur="this.style.borderColor='var(--border)'">
    <button id="list-search-clear" onclick="clearListSearch()"
      style="display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);
        background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:2px 4px;line-height:1;">✕</button>
  </div>
  <select id="list-cat-filter" onchange="renderList()"
    style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;
      color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.85rem;
      padding:9px 12px;outline:none;">
    <option value="">📚 전체 단원</option>
  </select>
</div>

</div>
<div class="list-view" id="list-view"></div>
<div class="modal-overlay" id="move-modal-overlay" onclick="closeMoveModal(event)">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:360px;">
    <div class="modal-title">📂 카테고리 이동</div>
    <div style="font-size:.78rem;color:var(--muted);font-family:'DM Mono',monospace;" id="move-count-label"></div>
    <div><label>이동할 카테고리</label><select id="move-cat-select"></select></div>
    <div class="modal-btns">

      <button class="modal-btn modal-save"   onclick="moveSelected()">이동</button>
    </div>

<div class="trash-view" id="trash-view">

    <div class="trash-title">🗑 휴지통</div>
    <button class="tbtn-empty" onclick="emptyTrash()">전체 영구삭제</button>
  </div>
  <div id="trash-list"></div>
</div>

      <div class="type-btn active" id="type-flash-btn" onclick="setAddType('flash')">📋 플래시카드 (조건→답)</div>

    <select id="add-cat">
      <option>PART1 · 구조계획</option>
      <option>PART2 · RC 총론</option>
      <option>PART2 · RC 사용성 및 내구성</option>
      <option>PART2 · RC 부재의 해석 및 설계</option>
    </select>
  </div>
  <div id="add-q-wrap"><label id="add-q-label">조건 / 질문</label>

  <div id="add-a-wrap"><label>답</label>

  <button class="btn-add-sub" onclick="addCard()">카드 추가하기</button>
</div>
<div class="add-view" id="settings-view" style="display:none;">
  <div style="font-size:.85rem;font-weight:700;color:var(--accent);padding-bottom:4px;border-bottom:1px solid var(--border);">⚙ 목차 카테고리 관리</div>
  <div>
    <label>카테고리 이름 변경</label>
    <select id="rename-cat-select" style="background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.88rem;padding:9px 12px;outline:none;width:100%;"></select>

    <label>새 이름</label>

  <div style="height:1px;background:var(--border);margin:4px 0;"></div>
  <div>
    <label>카테고리 합치기 (A → B로 이동)</label>
    <div style="display:flex;gap:6px;align-items:center;">
      <select id="merge-from" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.85rem;padding:8px 10px;outline:none;"></select>
      <span style="color:var(--muted);font-size:.8rem;">→</span>
      <select id="merge-to" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.85rem;padding:8px 10px;outline:none;"></select>
    </div>
  </div>
  <button class="btn-add-sub" onclick="mergeCats()" style="background:var(--surface);color:var(--text);border:1px solid var(--border);">합치기</button>
  <div style="height:1px;background:var(--border);margin:4px 0;"></div>

function getKeys() {
  return currentSubject === 'arch'
    ? {cards:'arch5_cards', history:'arch5_history', trash:'arch5_trash', cats:'arch5_cats'}
    : {cards:'eng1_cards',  history:'eng1_history',  trash:'eng1_trash',  cats:'eng1_cats'};
}
function getDefaultCards() {
  return currentSubject === 'arch' ? DEFAULT_CARDS : DEFAULT_ENG_CARDS;
}
function load() {
  const k = getKeys();
  try {
    const sh = localStorage.getItem(k.history);
    history = sh ? JSON.parse(sh) : {};
    const st = localStorage.getItem(k.trash);
    trash   = st ? JSON.parse(st) : [];

    const defaults = getDefaultCards();
    const sc = localStorage.getItem(k.cards);
    if (!sc) {
      cards = JSON.parse(JSON.stringify(defaults));
    } else {
      const stored = JSON.parse(sc);
      const storedMap = {};
      stored.forEach(c => storedMap[c.id] = c);

      defaults.forEach(def => {
        if (storedMap[def.id]) {
          storedMap[def.id].q    = def.q;
          storedMap[def.id].a    = def.a;
          storedMap[def.id].note = def.note;
          storedMap[def.id].type = def.type;
          storedMap[def.id].cat  = def.cat;
        } else {
          storedMap[def.id] = JSON.parse(JSON.stringify(def));
        }
      });

      const result = stored.map(c => storedMap[c.id]).filter(Boolean);
      defaults.forEach(def => {
        if (!stored.find(c=>c.id===def.id)) result.push(storedMap[def.id]);
      });
      cards = result;
    }
  } catch(e) {
    cards = JSON.parse(JSON.stringify(getDefaultCards())); history = {}; trash = [];
  }
}
function save() {
  const k = getKeys();
  try {
    localStorage.setItem(k.cards,   JSON.stringify(cards));
    localStorage.setItem(k.history, JSON.stringify(history));
    localStorage.setItem(k.trash,   JSON.stringify(trash));
    localStorage.setItem(k.cats,    JSON.stringify([...selectedCats]));
  } catch(e) {}
}
function loadCats() {
  const k = getKeys();
  try {
    const sc = localStorage.getItem(k.cats);
    selectedCats = sc ? new Set(JSON.parse(sc)) : new Set();
  } catch(e) { selectedCats = new Set(); }
}

// ═══════════════════ WEIGHT ═══════════════════
function getWeight(id) {
  const h = history[id];
  if (!h || h.know+h.dont === 0) return 1;
  const dontRatio = h.dont / (h.know + h.dont);
  const raw = 1 + dontRatio * 4;
  const recovery = h.know > 0 ? Math.min(1, h.dont / (h.know * 0.5 + 0.001)) : 1;
  let base = 1 + (raw - 1) * recovery;

  if (h.lastSeen) {
    const daysSince = (Date.now() - h.lastSeen) / (1000 * 60 * 60 * 24);
    if (daysSince > 7)       base *= 2.0;
    else if (daysSince > 3)  base *= 1.5;
    else if (daysSince > 1)  base *= 1.2;
  } else {
    base *= 1.8;
  }
  return base;
}
function weightedShuffle(pool) {
  const weighted = [];
  pool.forEach(c => {
    const w = Math.max(1, Math.round(getWeight(c.id) * 10));
    for (let i = 0; i < w; i++) weighted.push(c);
  });
  shuffle(weighted);
  const seen = new Set(), result = [];
  for (const c of weighted) {
    if (!seen.has(c.id)) { seen.add(c.id); result.push(c); }
    if (result.length >= pool.length) break;
  }
  pool.forEach(c => { if (!seen.has(c.id)) result.push(c); });
  return result;
}

function renderCats() {
  const row = document.getElementById('cat-row');
  row.innerHTML = '';

  const allBtn = document.createElement('button');

  allBtn.textContent = '전체';
  allBtn.onclick = () => { activeCat = '전체'; renderCats(); onCatChange(); };
  row.appendChild(allBtn);

  const cats = [...new Set(cards.map(c => c.cat))];

  if (currentSubject === 'eng') {
    cats.sort().forEach(cat => {
      const b = document.createElement('button');
      b.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
      b.textContent = cat;
      b.onclick = () => { activeCat = cat; renderCats(); onCatChange(); };
      row.appendChild(b);
    });
    return;
  }

  const parts = {};
  cats.forEach(cat => {
    const m = cat.match(/^(PART\d+)/);
    const partKey = m ? m[1] : '기타';
    if (!parts[partKey]) parts[partKey] = [];
    parts[partKey].push(cat);
  });

  const partLabels = {
    'PART1': 'PART 1 · 구조역학',
    'PART2': 'PART 2 · 일반구조',
    'PART3': 'PART 3 · 철근콘크리트',
    'PART4': 'PART 4 · 강구조',
    '기타':  '기타',
  };

  Object.keys(parts).sort().forEach(partKey => {
    const cats = parts[partKey];
    const isOpen = openParts.has(partKey);
    const hasActive = cats.includes(activeCat);
    if (hasActive) openParts.add(partKey);

    const group = document.createElement('div');
    group.className = 'cat-part-group';

    const hdr = document.createElement('div');
    hdr.className = 'cat-part-header' + (hasActive ? ' has-active' : '');
    hdr.innerHTML = `
      <span class="cat-part-label${hasActive?' has-active':''}">${partLabels[partKey]||partKey}</span>
      <span class="cat-part-arrow${(isOpen||hasActive)?' open':''}">▾</span>`;
    hdr.onclick = () => {
      if (openParts.has(partKey)) openParts.delete(partKey);
      else openParts.add(partKey);
      renderCats();
    };

    const items = document.createElement('div');
    items.className = 'cat-part-items' + ((isOpen||hasActive) ? ' open' : '');
    cats.forEach(cat => {
      const short = cat.replace(/^PART\d+ · /,'');
      const b = document.createElement('button');
      b.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
      b.textContent = short;
      b.title = cat;
      b.onclick = (e) => { e.stopPropagation(); activeCat = cat; renderCats(); onCatChange(); };
      items.appendChild(b);
    });

    group.appendChild(hdr);
    group.appendChild(items);
    row.appendChild(group);
  });
}

  try {

  } catch(e) {}

  if (isLegacy) {
    const tableRows = rows.map((r, i) => `
      <tr><td>${esc(r.label)}</td>
      <td><span class="cloze-blank" id="cb-${i}" onclick="revealBlank(${i},'${esc(r.value)}')">?</span></td></tr>`).join('');

      <button class="card-edit-btn" onclick="openEdit(${c.id})" style="align-self:center;margin-top:8px">✏ 수정</button>`;
  } else {
    const answers = c.a.split('/').map(s => s.trim());
    let blanks = 0;
    const qHtml = esc(c.q).replace(/\n/g,'<br>').replace(/___/g, () => {
      const idx = blanks;
      const ans = (answers[idx] || answers[0] || '?').replace(/'/g,"\'");
      blanks++;
      return `<span class="cloze-blank" id="cb-${idx}" onclick="revealBlank(${idx},'${ans}')">?</span>`;
    });
    document.getElementById('cloze-card').innerHTML = `
      <div class="cloze-type-badge">빈칸 채우기</div>
      <div class="cloze-title">${esc(c.cat)}</div>
      <div style="font-size:.98rem;font-weight:500;color:var(--text);line-height:1.9;word-break:keep-all;margin-bottom:14px;align-self:flex-start;">${qHtml}</div>
      <div class="cloze-hint">빈칸 탭 → 답 공개</div>
      <button class="card-edit-btn" onclick="openEdit(${c.id})" style="align-self:center;margin-top:8px">✏ 수정</button>`;
  }
}

function answer(know) {
  document.getElementById('ox-o').disabled = false;
  document.getElementById('ox-x').disabled = false;

  const c = queue.shift();
  if (!history[c.id]) history[c.id] = {know:0, dont:0};
  history[c.id].lastSeen = Date.now();
  stampToday();
  if (know) {
    history[c.id].know++; cleared.add(c.id); sessK++;
    spawnFloaty();
  } else {
    history[c.id].dont++; sessD++;
    clearFloaties();
    const minPos = Math.min(3, queue.length);
    const pos = queue.length <= minPos ? queue.length : minPos + Math.floor(Math.random() * (queue.length - minPos));
    queue.splice(pos, 0, c);
  }
  save(); renderCard();
}

const COUNT_OPTIONS=[5,10,15,20,30,'전체'];

function getReviewPool(weakFirst=false){
  let pool = reviewFiltered().filter(c=>history[c.id]&&(history[c.id].know+history[c.id].dont)>0);
  if (weakFirst) {
    const weak = pool.filter(c => {
      const h = history[c.id];
      const dontRatio = h.dont / (h.know + h.dont);
      const daysSince = h.lastSeen ? (Date.now() - h.lastSeen) / 86400000 : 999;
      return dontRatio >= 0.4 || daysSince >= 7;
    });
    return weak.length > 0 ? weak : pool;
  }
  return pool.sort((a, b) => getWeight(b.id) - getWeight(a.id));
}

function interleaveShuffle(pool) {
  const byCat = {};
  pool.forEach(c => { if (!byCat[c.cat]) byCat[c.cat] = []; byCat[c.cat].push(c); });
  Object.values(byCat).forEach(arr => shuffle(arr));
  const cats = Object.keys(byCat);
  const result = [];
  let last = null;
  while (result.length < pool.length) {
    const available = cats.filter(cat => byCat[cat].length > 0 && cat !== last);
    const pickCats = available.length > 0 ? available : cats.filter(cat => byCat[cat].length > 0);
    if (pickCats.length === 0) break;
    const cat = pickCats[Math.floor(Math.random() * pickCats.length)];
    result.push(byCat[cat].shift());
    last = cat;
  }
  return result;
}

function renderReviewStart(){
  const pool = getReviewPool();
  const wi = document.getElementById('weight-info');
  const sub = document.getElementById('review-sub');
  if (!pool.length) {
    wi.textContent = '먼저 학습 모드에서 카드를 봐주세요.';
    return;
  }
  const urgent = pool.filter(c => {
    const h = history[c.id];
    const daysSince = h?.lastSeen ? (Date.now() - h.lastSeen) / 86400000 : 999;
    return daysSince >= 1;
  }).length;
  const weak = pool.filter(c => {
    const h = history[c.id];
    return h && h.dont / (h.know + h.dont) >= 0.4;
  }).length;
  sub.innerHTML = `오늘 복습할 카드를 자동 선별해요<br>마지막으로 본 날짜 · 오답률 기반`;
  wi.innerHTML = `복습 대상 <b style="color:var(--accent2)">${pool.length}</b>개 · 긴급 <b style="color:var(--accent)">${urgent}</b>개 · 취약 <b style="color:var(--red)">${weak}</b>개`;
}

function startReview(weakFirst=false){
  const pool = getReviewPool(weakFirst);
  if (!pool.length) { alert('먼저 학습 모드에서 카드를 봐주세요.'); return; }
  isReview=true; sessK=0; sessD=0; cleared.clear();

}

// ═══════════════════ STATS ═══════════════════
function renderStats() {
  const allCards = cards;
  const totalCards = allCards.length;
  const seenCards = allCards.filter(c => history[c.id] && (history[c.id].know + history[c.id].dont) > 0);
  const totalKnow = seenCards.reduce((s,c) => s + (history[c.id]?.know||0), 0);
  const totalDont = seenCards.reduce((s,c) => s + (history[c.id]?.dont||0), 0);
  const pct = totalKnow+totalDont > 0 ? Math.round(totalKnow/(totalKnow+totalDont)*100) : 0;

  const catMap = {};
  allCards.forEach(c => {
    if (!catMap[c.cat]) catMap[c.cat] = {know:0, dont:0, total:0};
    catMap[c.cat].total++;
    const h = history[c.id];
    if (h) { catMap[c.cat].know += h.know||0; catMap[c.cat].dont += h.dont||0; }
  });

  const cats = Object.entries(catMap).sort((a,b) => {
    const ra = a[1].dont+a[1].know>0 ? a[1].dont/(a[1].dont+a[1].know) : 0;
    const rb = b[1].dont+b[1].know>0 ? b[1].dont/(b[1].dont+b[1].know) : 0;
    return rb - ra;
  });

  const lastSeenAll = allCards.map(c => history[c.id]?.lastSeen).filter(Boolean);
  const lastStudy = lastSeenAll.length > 0
    ? new Date(Math.max(...lastSeenAll)).toLocaleDateString('ko-KR')
    : '아직 없음';

  let html = `
  <div class="stats-summary">
    <div class="stats-card"><div class="stats-card-num">${pct}%</div><div class="stats-card-label">정답률</div></div>
    <div class="stats-card"><div class="stats-card-num">${seenCards.length}<span style="font-size:.9rem;color:var(--muted);">/${totalCards}</span></div><div class="stats-card-label">학습한 카드</div></div>
    <div class="stats-card"><div class="stats-card-num" style="font-size:1rem;">${lastStudy}</div><div class="stats-card-label">마지막 학습</div></div>
  </div>
  <div class="stats-section"><div class="stats-section-title">단원별 오답률 (높은 순)</div>`;

  const maxDont = Math.max(...cats.map(([,v]) => v.dont), 1);
  cats.forEach(([cat, v]) => {
    const total = v.know + v.dont;
    if (total === 0) return;
    const dontPct = Math.round(v.dont / total * 100);
    const barW = Math.round(v.dont / maxDont * 100);
    const isWeak = dontPct >= 40;
    const shortCat = cat.replace(/^PART\d+ · /,'');
    html += `
    <div class="stats-row">
      <div class="stats-cat-name">${esc(shortCat)}${isWeak?'<span class="stats-weak-badge">취약</span>':''}</div>
      <div class="stats-bar-wrap"><div class="stats-bar ${dontPct>=40?'bad':dontPct>=20?'mid':'good'}" style="width:${barW}%"></div></div>
      <div class="stats-counts">${v.dont}/${total}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('stats-content').innerHTML = html;
}

// ═══════════════════ CALENDAR ═══════════════════
const STAMPS = ['🐥','🐰','🦊','🐸','🐙','🦋','🐼','🐨','🦄','🐬','🍓','🍑','🍒','🍰','🧁','🍩','🌸','🌷','🌻','✨','💫','🎀','🍀','🌈','🎯','🔥','🍭','🎨','🐣','🍪'];

function getTodayKey() {
  const d = new Date();
  return `stamp_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
}
function stampToday() {
  const key = getTodayKey();
  if (localStorage.getItem(key)) return;
  const stamp = STAMPS[Math.floor(Math.random() * STAMPS.length)];
  localStorage.setItem(key, stamp);
}
function getStampData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('stamp_')) {
      const parts = k.split('_');
      if (parts.length === 4) {
        const dateStr = `${parts[1]}-${String(parts[2]).padStart(2,'0')}-${String(parts[3]).padStart(2,'0')}`;
        data[dateStr] = localStorage.getItem(k);
      }
    }
  }
  return data;
}
function renderCalendar() {
  const stampData = getStampData();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let streak = 0;
  const d = new Date(today);
  while (true) {
    const s = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (stampData[s]) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }

  let html = `<div class="cal-streak">🔥 연속 출석 <b>${streak}</b>일 · 총 <b>${Object.keys(stampData).length}</b>일 학습</div>`;
  const DOWS = ['일','월','화','수','목','금','토'];

  for (let m = 5; m >= 0; m--) {
    const base = new Date(today.getFullYear(), today.getMonth() - m, 1);
    const year = base.getFullYear(), month = base.getMonth();
    const monthLabel = `${year}년 ${month+1}월`;
    const firstDow = base.getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();

    html += `<div class="cal-month"><div class="cal-month-title">${monthLabel}</div>
      <div class="cal-grid">
        ${DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${Array(firstDow).fill('<div class="cal-day empty"></div>').join('')}`;

    for (let day = 1; day <= daysInMonth; day++) {
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const stamp = stampData[ds];
      const isToday = ds === todayStr;
      const cls = `cal-day${stamp?' stamped':''}${isToday?' today':''}`;
      html += `<div class="${cls}">
        ${stamp ? `<div class="cal-stamp">${stamp}</div>` : `<div class="cal-day-num">${day}</div>`}
        ${stamp ? `<div class="cal-day-num">${day}</div>` : ''}
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('calendar-content').innerHTML = html;
}

    wrap.innerHTML = `<div class="cat-select-items">${

  allCats.forEach(cat => {

      <div class="cat-select-part-label">${partLabels[pk]||pk}</div>

        const short = cat.replace(/^PART\d+ · /,'');

function toggleCatCheck(cat, btn) {
  if (selectedCats.size === 0) {
    const allCats = [...new Set(cards.map(c => c.cat))];
    allCats.forEach(c => selectedCats.add(c));
    document.querySelectorAll('.cat-check-btn').forEach(b => b.classList.add('checked'));

  if (selectedCats.has(cat)) {
    selectedCats.delete(cat);
    btn.classList.remove('checked');
  } else {
    selectedCats.add(cat);
    btn.classList.add('checked');
  }
}

function playBubble(type) {
  const ctx = audioCtx;
  const now = ctx.currentTime;

  function bubble(freq, dur, vol=0.09) { vol *= globalVolume * 2;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq * 1.3, now);
    osc.frequency.exponentialRampToValueAtTime(freq, now + dur * 0.3);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.6, now + dur);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + dur);
  }

  if (type === 'know') {
    // 뽀글뽀글 상승 3연타
    [0, 0.08, 0.16].forEach((d, i) => {
      setTimeout(() => {
        const f = [500, 650, 820][i];
        const o = ctx.createOscillator(), g = ctx.createGain();
        const t = ctx.currentTime;
        o.type = 'sine';
        o.frequency.setValueAtTime(f*1.2, t);
        o.frequency.exponentialRampToValueAtTime(f*0.7, t+0.12);
        g.gain.setValueAtTime(0.18, t);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.13);
        o.connect(g); g.connect(ctx.destination);
        o.start(t); o.stop(t+0.13);
      }, d * 1000);
    });
  } else if (type === 'dont') {
    // 뿌직 터지는 버블
    bubble(180, 0.2, 0.2);
    setTimeout(() => { const t=ctx.currentTime; bubble(120, 0.15, 0.08); }, 80);
  } else if (type === 'flip') {
    bubble(700, 0.08, 0.1);
  } else {
    bubble(500, 0.06, 0.08);
  }
}

// ── 게임 효과음 ──
function playGame(type) {
  const ctx = audioCtx;
  const now = ctx.currentTime;

  if (type === 'know') {
    // 맞췄을 때: 밝은 상승 코인 소리
    [0, 0.07, 0.14].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime([523, 659, 784][i], now + delay);
      gain.gain.setValueAtTime(0.07 * globalVolume * 2, now + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.12);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(now + delay); osc.stop(now + delay + 0.12);
    });

  } else if (type === 'dont') {
    // 틀렸을 때: 낮은 bzzzt
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(120, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.15);
    gain.gain.setValueAtTime(0.08 * globalVolume * 2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.18);

  } else if (type === 'flip') {
    // 카드 뒤집기: 짧은 틱
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(900, now);
    osc.frequency.exponentialRampToValueAtTime(400, now + 0.05);
    gain.gain.setValueAtTime(0.05 * globalVolume * 2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.06);

  } else {
    // 일반 탭: 짧은 클릭
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, now);
    gain.gain.setValueAtTime(0.04 * globalVolume * 2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.04);
  }
}

  if (!btn) return;
  if (btn.classList.contains('btn-know') || btn.id === 'ox-o') { playWood('know'); return; }
  if (btn.classList.contains('btn-dontknow') || btn.id === 'ox-x') { playWood('dont'); return; }
  if (btn.classList.contains('btn-flip') || btn.id === 'btn-next') { playWood('flip'); return; }
  playWood('tap');
}, { passive: true });

function applyVol(gainNode, baseVol) {
  gainNode.gain.setValueAtTime(baseVol * globalVolume * 2, audioCtx.currentTime);
}

function playWood(type) {
  if (soundTheme === 'off') return;
  if (soundTheme === 'bubble') playBubble(type);
  else playGame(type);
}

// ═══════════════════ INIT ═══════════════════
document.getElementById('modal-type').addEventListener('change', toggleModalType);
load(); loadCats(); renderCats(); updateTrashBadge(); updateCatSelectLabel(); switchTab('study');
</script>
